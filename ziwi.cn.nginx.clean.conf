server {
    listen 80;
    server_name www.ziwi.cn ziwi.cn bbs.ziwi.cn;
    return 301 https://$server_name$request_uri;
}
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2;
    server_name www.ziwi.cn ziwi.cn bbs.ziwi.cn;

    ssl_certificate /etc/nginx/ssl/ziwi.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/ziwi.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/ziwi-cn;

    # ===== 知微能碳管理系统 DEMO =====
    location /demo/ecms/ {
        alias /var/www/demo/ecms/;
        index index.html;
        try_files $uri $uri/ /demo/ecms/index.html;
    }
    location /demo/ecms/api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ===================================

    # BBS API
    location /bbs/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /bbs/assets/ {
        alias /var/www/ziwi-cn/bbs/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /bbs/images/ {
        alias /var/www/ziwi-cn/bbs/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /bbs/ {
        index index.html;
        try_files $uri $uri/ /bbs/index.html;
    }

    # 主站 API
    location /api/ { proxy_pass http://127.0.0.1:5000/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin { proxy_pass http://127.0.0.1:5000/admin; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location / { index home.html; try_files $uri $uri/ /home.html; }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp)$ { expires 1y; add_header Cache-Control "public, immutable"; }
    # HTML 不缓存
    location ~* \.html$ { expires -1; add_header Cache-Control "no-cache"; }
}
