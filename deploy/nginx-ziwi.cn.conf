# ziwi.cn nginx config - synced from production server 193.112.163.147
# Last synced: 2026-05-28
# Nginx config for ziwi.cn, including /demo/ecms/ route for 知微能碳管理系统 V2.0
# IMPORTANT: do NOT use alias + try_files together; use root in location block instead

server {
    listen 80;
    listen 443 ssl http2;
    server_name ziwi.cn www.ziwi.cn;

    # SSL cert managed by Let's Encrypt (reuse existing cert for ziwi.cn)
    ssl_certificate     /etc/letsencrypt/live/ziwi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ziwi.cn/privkey.pem;

    # ==== Main site (ziwi.cn) ====
    location / {
        root /var/www/ziwi-cn;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ===== 知微能碳管理系统 DEMO (/demo/ecms/) =====
    # CRITICAL: use `root /var/www` NOT `alias /var/www/demo/ecms/`
    # because try_files fallback always uses `root`, never `alias`
    location ^~ /demo/ecms/ {
        root /var/www;
        index index.html;
        try_files $uri $uri/ /demo/ecms/index.html;
    }

    # API proxy to FastAPI backend (port 8088)
    location ^~ /demo/ecms/api/ {
        proxy_pass http://127.0.0.1:8088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ===================================

    # Other routes ...
}
